<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Matchmaking</title>
    <link rel="stylesheet" href="/public/styles.css" />
  </head>
  <body data-page="user-matchmaking">
    <main class="user-match-stage-layout">
      <button id="user-match-back-button" class="user-match-back-button secondary-action" type="button">Back to Home</button>
      <section class="single-card-stage-wrap phase-manager-stage-wrap user-match-stage-wrap">
        <div id="phase-manager-turn-overlay" class="phase-manager-turn-overlay">Start matchmaking to begin a match.</div>
        <div class="match-avatar-hud" aria-live="polite">
          <div class="match-avatar-row match-avatar-row-player">
            <div id="match-player-avatar" class="match-avatar-circle" aria-hidden="true"></div>
            <p id="match-player-name" class="match-avatar-name">You</p>
          </div>
          <div class="match-avatar-row match-avatar-row-opponent">
            <p id="match-opponent-name" class="match-avatar-name">Opponent</p>
            <div id="match-opponent-avatar" class="match-avatar-circle" aria-hidden="true"></div>
          </div>
        </div>
        <canvas id="phase-manager-canvas" class="single-card-canvas user-match-canvas" aria-label="Phase manager card interaction canvas"></canvas>
      </section>
    </main>

    <script type="module" src="/public/projects/user/match.js"></script>
  </body>
</html>
